            - workflows
         summary: Start a workflow instance for a node
         description: No instance UUID exists yet at start time. Provide nodeUuid and workflowDefinitionUuid in the request body. The response includes the newly created instance UUID.
         operationId: startWorkflow
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: object
                     required:
                        - nodeUuid
                        - workflowDefinitionUuid
                     properties:
                        nodeUuid:
                           type: string
                           format: uuid
                           description: UUID of the node to attach the workflow to
                        workflowDefinitionUuid:
                           type: string
                           format: uuid
                           description: UUID of the workflow definition to use
                        participants:
                           type: array
                           description: Optional override for the pool of groups allowed to view and interact with this workflow instance. If not specified, uses the workflow definition's participants. If empty array, all users can access.
                           items:
                              type: string
                              format: uuid
         responses:
            "200":
               description: Workflow instance started successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/WorkflowInstance"
            default:
               $ref: "#/components/responses/Error"
