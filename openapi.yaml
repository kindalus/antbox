               description: File updated successfully
            "400":
               description: Bad request - workflow is cancelled or completed
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            "403":
               description: Forbidden - user not allowed to modify node in current state
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
   /workflow-definitions:
      get:
         tags:
            - workflows
         summary: List all workflow definitions
         operationId: listWorkflowDefinitions
         responses:
            "200":
               description: A list of workflow definitions
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/WorkflowDefinition"
            default:
               $ref: "#/components/responses/Error"
      post:
         tags:
            - workflows
         summary: Create or replace a workflow definition
         operationId: createOrReplaceWorkflowDefinition
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: object
                     required:
                        - title
                        - states
                        - availableStateNames
                     properties:
                        uuid:
                           type: string
                           format: uuid
                           description: Optional UUID for update, omit for create
                        title:
                           type: string
                           description: Workflow definition title
                        description:
                           type: string
                           description: Workflow definition description
                        states:
                           type: array
                           description: Array of workflow states
                           items:
                              $ref: "#/components/schemas/WorkflowState"
                        availableStateNames:
                           type: array
                           description: Array of all state names in the workflow
                           items:
                              type: string
                        filters:
                           $ref: "#/components/schemas/NodeFilters"
                           description: Optional filters to restrict which nodes can use this workflow. Empty filters allow all nodes.
                        participants:
                           type: array
                           description: Optional pool of groups allowed to start and view workflow instances. If empty or omitted, all users can start and view instances.
                           items:
                              type: string
                              format: uuid
         responses:
            "200":
               description: Workflow definition created or updated successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/WorkflowDefinition"
            default:
               $ref: "#/components/responses/Error"
   "/workflow-definitions/{uuid}":
      get:
         tags:
            - workflows
         summary: Get a workflow definition
         operationId: getWorkflowDefinition
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Workflow definition details
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/WorkflowDefinition"
            default:
               $ref: "#/components/responses/Error"
      delete:
         tags:
            - workflows
         summary: Delete a workflow definition
         operationId: deleteWorkflowDefinition
         description: Deletes a workflow definition. Fails if active instances exist.
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Workflow definition deleted successfully
            "400":
               description: Cannot delete - active instances exist
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
   "/workflow-definitions/{uuid}/-/export":
      get:
         tags:
            - workflows
         summary: Export a workflow definition
         operationId: exportWorkflowDefinition
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Workflow definition exported successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/WorkflowDefinition"
            default:
               $ref: "#/components/responses/Error"
components:
   schemas:
      ModuleConfiguration:
         type: array
         description: "Module path followed by zero or more string parameters: [modulePath, ...params]"
         minItems: 1
         items:
            type: string
      AIConfiguration:
         type: object
         required:
            - enabled
            - defaultModel
         properties:
            enabled:
               type: boolean
            defaultModel:
               type: string
               description: "ADK model string, e.g. \"google/gemini-2.5-flash\""
            embeddingProvider:
               $ref: "#/components/schemas/ModuleConfiguration"
            ocrProvider:
               $ref: "#/components/schemas/ModuleConfiguration"
            skillsPath:
               type: string
               description: Path to extra skills directory
      TenantConfiguration:
         type: object
         required:
            - name
            - storage
            - repository
            - configurationRepository
            - eventStoreRepository
         properties:
            name:
               type: string
               description: Tenant identifier
            rootPasswd:
               type: string
               description: Optional tenant-level root password override
            key:
               type: string
               description: Path to symmetric key file
            jwks:
               type: string
               description: Path or URL to JWKS file
            storage:
               $ref: "#/components/schemas/ModuleConfiguration"
            repository:
               $ref: "#/components/schemas/ModuleConfiguration"
            configurationRepository:
               $ref: "#/components/schemas/ModuleConfiguration"
            eventStoreRepository:
               $ref: "#/components/schemas/ModuleConfiguration"
            ai:
               $ref: "#/components/schemas/AIConfiguration"
      Agent:
         type: object
         description: AI Agent configuration data.
         required:
            - uuid
            - name
            - exposedToUsers
            - createdTime
            - modifiedTime
         properties:
            uuid:
               type: string
               description: Unique identifier for the agent
            name:
               type: string
               description: Display name of the agent
            description:
               type: string
               description: Optional description of the agent's purpose
            type:
               type: string
               enum:
                  ["llm", "sequential", "parallel", "loop"]
               description: Agent execution type. Defaults to llm.
            exposedToUsers:
               type: boolean
               description: Whether users can directly call this agent with chat or answer. Hidden agents can still be used internally by workflow agents.
            model:
               type: string
               description: Optional model identifier (ADK format). Falls back to tenant default model.
            tools:
               description: Tool access for llm agents. `true` grants all tools; `false`, omitted, or `[]` grants only `skillLoader`; arrays grant the listed tools plus `skillLoader`.
               oneOf:
                  - type: boolean
                  - type: array
                    items:
                       type: string
            systemPrompt:
               type: string
               description: System prompt for llm agents.
            agents:
               type: array
               description: Ordered list of sub-agent UUIDs for workflow agents.
               items:
                  type: string
            createdTime:
               type: string
               format: date-time
               description: When the agent was created
            modifiedTime:
               type: string
               format: date-time
               description: When the agent was last modified
      CreateAgentRequest:
         type: object
         description: "Request body for creating an agent. Agents default to `exposedToUsers: true` when omitted."
         required:
            - name
         anyOf:
            - required:
                 - systemPrompt
            - required:
                 - agents
         properties:
            name:
               type: string
               description: Display name of the agent
            description:
               type: string
               description: Optional description of the agent
            type:
               type: string
               enum:
                  ["llm", "sequential", "parallel", "loop"]
            exposedToUsers:
               type: boolean
               description: Whether users can directly call this agent with chat or answer.
            model:
               type: string
               description: Optional model identifier for llm agents
            tools:
               description: Tool access for llm agents. `true` grants all tools; `false`, omitted, or `[]` grants only `skillLoader`; arrays grant the listed tools plus `skillLoader`.
               oneOf:
                  - type: boolean
                  - type: array
                    items:
                       type: string
            systemPrompt:
               type: string
               description: Required for llm agents
            agents:
               type: array
               description: Required (non-empty) for sequential/parallel/loop agents
               items:
                  type: string
      ApiKey:
         type: object
         description: API Key configuration data for programmatic access.
         required:
            - uuid
            - title
            - secret
            - group
            - active
            - createdTime
         properties:
            uuid:
               type: string
               description: Unique identifier for the API key
            title:
               type: string
               description: Display name for the API key
            secret:
               type: string
               description: The API key secret (only returned on creation)
            group:
               type: string
               description: Group identifier that this API key belongs to (determines permissions)
            description:
               type: string
               description: Optional description of the API key's purpose
            active:
               type: boolean
               description: Whether the API key is active and can be used for authentication
            createdTime:
               type: string
               format: date-time
               description: When the API key was created
      AntboxError:
         type: object
         required:
            - errorCode
            - message
         properties:
            errorCode:
               type: string
            message:
               type: string
      AspectProperty:
         type: object
         description: Definition of a single property within an aspect schema.
         required:
            - name
            - title
            - type
         properties:
            name:
               type: string
               description: Property identifier (must match /^[a-zA-Z_][_a-zA-Z0-9_]{2,}$/)
            title:
               type: string
               description: Display label for the property
            type:
               type: string
               enum:
                  ["uuid", "string", "number", "boolean", "object", "array", "file"]
               description: Data type of the property
            arrayType:
               type: string
               enum: ["string", "number", "uuid"]
               description: Element type when type is "array"
            contentType:
               type: string
               description: MIME type hint for string content (e.g., "text/markdown", "text/html")
            readonly:
               type: boolean
               description: Whether the property is read-only
            searchable:
               type: boolean
               description: Whether the property should be indexed for search
            required:
               type: boolean
               description: Whether the property is required
            defaultValue:
               description: Default value for the property
               oneOf:
                  - type: string
                  - type: number
                  - type: boolean
            validationRegex:
               type: string
               description: Regex pattern for string validation
            validationList:
               type: array
               description: List of allowed values (enum)
               items:
                  type: string
            validationFilters:
               $ref: "#/components/schemas/NodeFilters"
               description: For uuid type - filters to restrict valid reference targets
      AnswerOptions:
         type: object
         properties:
            files:
               type: array
               description: Optional files to include as multimodal context.
               items:
                  type: string
                  format: binary
            temperature:
               type: number
            maxTokens:
               type: integer
            instructions:
               type: string
      Aspect:
         type: object
         description: Aspect configuration data. Aspects define metadata schemas that can be attached to nodes.
         required:
            - uuid
            - title
            - filters
            - properties
            - createdTime
            - modifiedTime
         properties:
            uuid:
               type: string
               description: Unique identifier for the aspect (kebab-case)
            title:
               type: string
               description: Display name for the aspect
            description:
               type: string
               description: Optional description of the aspect's purpose
            filters:
               $ref: "#/components/schemas/NodeFilters"
               description: Optional filters to restrict which nodes can have this aspect
            properties:
               type: array
               description: Schema definition for the aspect's properties
               items:
                  $ref: "#/components/schemas/AspectProperty"
            createdTime:
               type: string
               format: date-time
               description: When the aspect was created
            modifiedTime:
               type: string
               format: date-time
               description: When the aspect was last modified
      CreateAspectRequest:
         type: object
         description: Multipart upload for creating an aspect. Send a JSON file in the `file` field. If the JSON payload omits `uuid`, the server uses the uploaded file name without the last extension and replaces spaces with `-`.
         required:
            - file
         properties:
            file:
               type: string
               format: binary
               description: JSON aspect definition file uploaded as multipart/form-data.
      ChatOptions:
         type: object
         properties:
            history:
               type: array
               description: Previous conversation messages.
               items:
                  type: object
                  properties:
                     role:
                        type: string
                     text:
                        type: string
                     timestamp:
                        type: string
                        format: date-time
            files:
               type: array
               description: Optional files to include as multimodal context.
               items:
                  type: string
                  format: binary
            temperature:
               type: number
            maxTokens:
               type: integer
            instructions:
               type: string
      ToolCall:
         type: object
         required:
            - name
            - args
         properties:
            name:
               type: string
            args:
               type: object
               additionalProperties: true
      ToolResponse:
         type: object
         required:
            - name
            - text
         properties:
            name:
               type: string
            text:
               type: string
      ChatMessagePart:
         type: object
         properties:
            text:
               type: string
            toolCall:
               $ref: "#/components/schemas/ToolCall"
            toolResponse:
               $ref: "#/components/schemas/ToolResponse"
      ChatMessage:
         type: object
         required:
            - role
            - parts
         properties:
            role:
               type: string
               enum:
                  ["user", "model", "tool"]
            parts:
               type: array
               items:
                  $ref: "#/components/schemas/ChatMessagePart"
      ChatHistory:
         type: array
         items:
            $ref: "#/components/schemas/ChatMessage"
      DocInfo:
         type: object
         required:
            - uuid
            - description
         properties:
            uuid:
               type: string
            description:
               type: string
      Feature:
         type: object
         description: Feature configuration data. A feature must be exposed as at least one of action, extension, or AI tool. Automatic triggers are only valid for actions.
         required:
            - uuid
            - title
            - description
            - exposeAction
            - exposeExtension
            - exposeAITool
            - runOnCreates
            - runOnUpdates
            - runOnDeletes
            - runManually
            - filters
            - groupsAllowed
            - parameters
            - returnType
            - run
            - createdTime
            - modifiedTime
         properties:
            uuid:
               type: string
               description: Unique identifier for the feature (camelCase)
            title:
               type: string
               description: Display name for the feature
            description:
               type: string
               description: Description of the feature's purpose
            exposeAction:
               type: boolean
               description: Whether the feature can be called as an action on nodes. At least one expose flag must be true.
            exposeExtension:
               type: boolean
               description: Whether the feature exposes a custom HTTP endpoint. At least one expose flag must be true.
            exposeAITool:
               type: boolean
               description: Whether the feature is available to AI agents as a tool. At least one expose flag must be true.
            runOnCreates:
               type: boolean
               description: Auto-trigger when nodes matching filters are created. Requires exposeAction to be true.
            runOnUpdates:
               type: boolean
               description: Auto-trigger when nodes matching filters are updated. Requires exposeAction to be true.
            runOnDeletes:
               type: boolean
               description: Auto-trigger when nodes matching filters are deleted. Requires exposeAction to be true.
            runManually:
               type: boolean
               description: Whether the feature can be triggered manually
            filters:
               type: array
               description: Filters to scope which nodes this feature applies to
               items:
                  $ref: "#/components/schemas/NodeFilter"
            runAs:
               type: string
               description: User email or "system" to run as
            groupsAllowed:
               type: array
               description: Groups allowed to execute this feature
               items:
                  type: string
            parameters:
               type: array
               description: Input parameters for the feature. Action features must include a required `uuids` parameter as `array<string>`.
               items:
                  $ref: "#/components/schemas/FeatureParameter"
            returnType:
               type: string
               enum:
                  ["string", "number", "boolean", "array", "object", "file", "void"]
               description: Return type of the feature
            returnDescription:
               type: string
               description: Description of what the feature returns
            returnContentType:
               type: string
               description: MIME type hint for the return value (e.g., "text/html")
            tags:
               type: array
               description: Optional classification tags
               items:
                  type: string
            run:
               type: string
               description: The persisted JavaScript function source for the feature runtime
            createdTime:
               type: string
               format: date-time
               description: When the feature was created
            modifiedTime:
               type: string
               format: date-time
               description: When the feature was last modified
         anyOf:
            - properties:
                 exposeAction:
                    const: true
            - properties:
                 exposeExtension:
                    const: true
            - properties:
                 exposeAITool:
                    const: true
         allOf:
            - if:
                 anyOf:
                    - properties:
                         runOnCreates:
                            const: true
                    - properties:
                         runOnUpdates:
                            const: true
                    - properties:
                         runOnDeletes:
                            const: true
              then:
                 properties:
                    exposeAction:
                       const: true
      CreateFeatureRequest:
         type: object
         description: Multipart upload for creating a feature. Send a JavaScript module file in the `file` field. If `export default.uuid` is missing, the server uses the uploaded file name without the last extension and replaces spaces with `_`. Action features must declare a required `uuids` parameter as `array<string>`.
         required:
            - file
         properties:
            file:
               type: string
               format: binary
               description: JavaScript feature module file uploaded as multipart/form-data.
      FeatureActionResult:
         description: Result payload returned when running a feature action. The concrete shape depends on the feature's declared returnType.
         nullable: true
         oneOf:
            - type: object
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
      FeatureParameter:
         type: object
         required:
            - name
            - type
            - required
         properties:
            name:
               type: string
            type:
               type: string
               enum: ["string", "number", "boolean", "object", "array", "file"]
            arrayType:
               type: string
               enum: ["string", "number", "file", "object"]
            contentType:
               type: string
            required:
               type: boolean
            description:
               type: string
            defaultValue:
               type: object
               nullable: true
      FilterOperator:
         type: string
         description: The comparison or logical operator for filtering.
         enum:
            - "=="
            - "<="
            - ">="
            - "<"
            - ">"
            - "!="
            - "in"
            - "not-in"
            - "match"
            - "contains"
            - "contains-all"
            - "contains-any"
            - "not-contains"
            - "contains-none"

      NodeFilter:
         type: array
         description: A single filter tuple #: [field: string, operator: FilterOperator, value: unknown].
         # Represents a tuple (fixed length array with different types for each item)
         items:
            - type: string # field: string
            - $ref: "#/components/schemas/FilterOperator" # operator: FilterOperator
            - {} # value: unknown (empty schema allows any type)
         minItems: 3
         maxItems: 3

      NodeFilters1D:
         type: array
         description: An array of NodeFilter tuples (AND/OR logic implied by the endpoint).
         items:
            $ref: "#/components/schemas/NodeFilter"

      NodeFilters2D:
         type: array
         description: An array of NodeFilters1D arrays (representing nested logic, e.g., OR groups of AND filters).
         items:
            $ref: "#/components/schemas/NodeFilters1D"

      NodeFilters:
         description: Either a 1D array of filters or a 2D array of filters.
         oneOf:
            - $ref: "#/components/schemas/NodeFilters1D"
            - $ref: "#/components/schemas/NodeFilters2D"
      Permission:
         type: string
         enum:
            - Read
            - Write
            - Export
      Permissions:
         type: object
         properties:
            group:
               type: array
               items:
                  $ref: "#/components/schemas/Permission"
            authenticated:
               type: array
               items:
                  $ref: "#/components/schemas/Permission"
            anonymous:
               type: array
               items:
                  $ref: "#/components/schemas/Permission"
            advanced:
               type: object
               additionalProperties:
                  type: array
                  items:
                     $ref: "#/components/schemas/Permission"
      BaseNode:
         type: object
         required:
            - uuid
            - fid
            - title
            - mimetype
            - parent
            - createdTime
            - modifiedTime
            - owner
         properties:
            uuid:
               type: string
               format: uuid
            fid:
               type: string
            title:
               type: string
            description:
               type: string
            mimetype:
               type: string
            parent:
               type: string
               format: uuid
            createdTime:
               type: string
               format: date-time
            modifiedTime:
               type: string
               format: date-time
            owner:
               type: string
               format: email
            fulltext:
               type: string
            permissions:
               $ref: "#/components/schemas/Permissions"
            locked:
               type: boolean
               description: Indicates if the node is locked
               default: false
            lockedBy:
               type: string
               format: email
               description: Email of the user who locked the node
            unlockAuthorizedGroups:
               type: array
               items:
                  type: string
                  format: uuid
               description: UUIDs of groups authorized to unlock this node
               default: []
      FileNode:
         type: object
         allOf:
            - $ref: "#/components/schemas/BaseNode"
         properties:
            size:
               type: integer
            aspects:
               type: array
               items:
                  type: string
                  format: uuid
            properties:
               type: object
               additionalProperties: true
            tags:
               type: array
               items:
                  type: string
            related:
               type: array
               items:
                  type: string
                  format: uuid
      FolderNode:
         type: object
         allOf:
            - $ref: "#/components/schemas/BaseNode"
         properties:
            aspects:
               type: array
               items:
                  type: string
                  format: uuid
            filters:
               type: array
               items:
                  type: object
            group:
               type: string
               format: uuid
            onCreate:
               type: array
               items:
                  type: string
            onDelete:
               type: array
               items:
                  type: string
            onUpdate:
               type: array
               items:
                  type: string
            permissions:
               $ref: "#/components/schemas/Permissions"
            properties:
               type: object
               additionalProperties: true
            related:
               type: array
               items:
                  type: string
                  format: uuid
            tags:
               type: array
               items:
                  type: string
      Group:
         type: object
         description: Group configuration data. Groups are immutable (created/deleted only, not updated).
         required:
            - uuid
            - title
            - createdTime
         properties:
            uuid:
               type: string
               description: Unique identifier for the group
            title:
               type: string
               description: Display name for the group
            description:
               type: string
               description: Optional description of the group's purpose
            createdTime:
               type: string
               format: date-time
               description: When the group was created
      MetaNode:
         type: object
         allOf:
            - $ref: "#/components/schemas/BaseNode"
         properties:
            aspects:
               type: array
               items:
                  type: string
                  format: uuid
            properties:
               type: object
               additionalProperties: true
            related:
               type: array
               items:
                  type: string
                  format: uuid
            tags:
               type: array
               items:
                  type: string
      SmartFolderNode:
         type: object
         allOf:
            - $ref: "#/components/schemas/BaseNode"
         properties:
            filters:
               type: array
               items:
                  type: object
      User:
         type: object
         description: User configuration data.
         required:
            - email
            - title
            - group
            - groups
            - hasWhatsapp
            - active
            - createdTime
            - modifiedTime
         properties:
            email:
               type: string
               format: email
               description: User's email address (used as unique identifier)
            title:
               type: string
               description: User's full name
            group:
               type: string
               description: Primary group UUID
            groups:
               type: array
               description: All group memberships
               items:
                  type: string
            phone:
               type: string
               description: Optional phone number
            hasWhatsapp:
               type: boolean
               description: Whether the phone number has WhatsApp
            active:
               type: boolean
               description: Whether the user can login
            createdTime:
               type: string
               format: date-time
               description: When the user was created
            modifiedTime:
               type: string
               format: date-time
               description: When the user was last modified
      CreateUserRequest:
         type: object
         description: Request body for creating a new user.
         required:
            - email
            - title
            - group
         properties:
            email:
               type: string
               format: email
               description: User's email address (used as unique identifier)
            title:
               type: string
               description: User's full name
            group:
               type: string
               description: Primary group UUID
            groups:
               type: array
               description: Additional group memberships
               items:
                  type: string
            phone:
               type: string
               description: Optional phone number
            hasWhatsapp:
               type: boolean
               description: Whether the phone number has WhatsApp
            active:
               type: boolean
               description: Whether the user can login (defaults to true)
      UpdateUserRequest:
         type: object
         description: Request body for updating an existing user.
         properties:
            title:
               type: string
               description: User's full name
            group:
               type: string
               description: Primary group UUID
            groups:
               type: array
               description: All group memberships
               items:
                  type: string
            phone:
               type: string
               description: Optional phone number
            hasWhatsapp:
               type: boolean
               description: Whether the phone number has WhatsApp
            active:
               type: boolean
               description: Whether the user can login
      UserPreferences:
         type: object
         description: Private preferences for the authenticated user.
         required:
            - email
            - preferences
         properties:
            email:
               type: string
               format: email
               description: Email of the authenticated user.
            preferences:
               type: object
               additionalProperties: true
               description: Arbitrary key-value preferences owned by the authenticated user.
      UpdateUserPreferencesRequest:
         type: object
         required:
            - preferences
         properties:
            preferences:
               type: object
               additionalProperties: true
               description: Preference values to create or shallow-merge for the authenticated user.
      NodeLike:
         description: Union of all node types (content layer only, not configuration records)
         oneOf:
            - $ref: "#/components/schemas/FileNode"
            - $ref: "#/components/schemas/FolderNode"
            - $ref: "#/components/schemas/MetaNode"
            - $ref: "#/components/schemas/SmartFolderNode"
      NodeMetadata:
         type: object
         properties:
            uuid:
               type: string
               format: uuid
            fid:
               type: string
            title:
               type: string
            name:
               type: string
            description:
               type: string
            mimetype:
               type: string
            size:
               type: integer
            parent:
               type: string
               format: uuid
            createdTime:
               type: string
               format: date-time
            modifiedTime:
               type: string
               format: date-time
            owner:
               type: string
               format: email
            aspects:
               type: array
               items:
                  type: string
                  format: uuid
            tags:
               type: array
               items:
                  type: string
            related:
               type: array
               items:
                  type: string
                  format: uuid
            properties:
               type: object
               additionalProperties: true
            fulltext:
               type: string
            filters:
               type: object
            group:
               type: string
               format: uuid
            groups:
               type: array
               items:
                  type: string
                  format: uuid
            email:
               type: string
               format: email
            phone:
               type: string
               description: Optional phone number
            hasWhatsapp:
               type: boolean
               description: Whether the phone number has WhatsApp (always false if phone is not provided)
            secret:
               type: string
            onCreate:
               type: array
               items:
                  type: string
            onUpdate:
               type: array
               items:
                  type: string
            onDelete:
               type: array
               items:
                  type: string
            permissions:
               $ref: "#/components/schemas/Permissions"
            runManually:
               type: boolean
            runAs:
               type: string
            parameters:
               type: array
               items:
                  $ref: "#/components/schemas/FeatureParameter"
            returnType:
               type: string
               enum:
                  ["string", "number", "boolean", "array", "object", "file", "void"]
            returnDescription:
               type: string
            returnContentType:
               type: string
            groupsAllowed:
               type: array
               items:
                  type: string
                  format: uuid
            runOnCreates:
               type: boolean
            runOnUpdates:
               type: boolean
            runOnDeletes:
               type: boolean
            exposeAction:
               type: boolean
            exposeExtension:
               type: boolean
            exposeAITool:
               type: boolean
      TemplateInfo:
         type: object
         required:
            - uuid
            - description
         properties:
            uuid:
               type: string
            description:
               type: string
      WorkflowDefinition:
         type: object
         required:
            - uuid
            - title
            - description
            - owner
            - createdTime
            - modifiedTime
            - states
            - availableStateNames
            - filters
            - participants
         properties:
            uuid:
               type: string
               format: uuid
               description: Unique identifier for the workflow definition
            title:
               type: string
               description: Workflow definition title
            description:
               type: string
               description: Workflow definition description
            owner:
               type: string
               format: email
               description: Email of the workflow definition owner
            createdTime:
               type: string
               format: date-time
               description: When the workflow definition was created
            modifiedTime:
               type: string
               format: date-time
               description: When the workflow definition was last modified
            states:
               type: array
               description: Array of workflow states
               items:
                  $ref: "#/components/schemas/WorkflowState"
            availableStateNames:
               type: array
               description: Array of all state names in the workflow
               items:
                  type: string
            filters:
               $ref: "#/components/schemas/NodeFilters"
               description: Filters to restrict which nodes can use this workflow. Empty filters allow all nodes.
            participants:
               type: array
               description: Pool of groups allowed to start and view workflow instances. If empty, all users can start and view instances.
               items:
                  type: string
                  format: uuid
      WorkflowState:
         type: object
         required:
            - name
         properties:
            name:
               type: string
               description: Unique name of the state (e.g., "Draft", "In Review")
            isInitial:
               type: boolean
               description: Is this where new items start?
            isFinal:
               type: boolean
               description: Is the workflow complete when reaching this state?
            onEnter:
               type: array
               description: IDs/Names of actions to execute when entering this state
               items:
                  type: string
            onExit:
               type: array
               description: IDs/Names of actions to execute before leaving this state
               items:
                  type: string
            transitions:
               type: array
               description: The possible paths out of this state
               items:
                  $ref: "#/components/schemas/WorkflowTransition"
      WorkflowTransition:
         type: object
         required:
            - signal
            - targetState
         properties:
            signal:
               type: string
               description: The signal/event name that triggers this transition
            targetState:
               type: string
               description: The name of the destination state
            filters:
               type: array
               description: Guard conditions - transition only valid if node satisfies these filters
               items:
                  type: array
                  items: {}
            actions:
               type: array
               description: IDs/Names of actions to execute during the transition
               items:
                  type: string
            groupsAllowed:
               type: array
               description: List of groups allowed to execute this transition
               items:
                  type: string
                  format: uuid
      WorkflowInstance:
         type: object
         required:
            - uuid
            - workflowDefinitionUuid
            - nodeUuid
            - currentStateName
            - running
            - cancelled
            - participants
            - owner
            - startedTime
         properties:
            uuid:
               type: string
               format: uuid
               description: Unique identifier for the workflow instance
            workflowDefinitionUuid:
               type: string
               format: uuid
               description: UUID of the workflow definition node
            nodeUuid:
               type: string
               format: uuid
               description: UUID of the node this workflow is attached to
            currentStateName:
               type: string
               description: Name of the current state in the workflow
            running:
               type: boolean
               description: Whether the workflow is still running (false when a final state is reached or cancelled)
            cancelled:
               type: boolean
               description: Whether this workflow instance has been cancelled. A cancelled workflow stops running and cannot be transitioned further.
            history:
               type: array
               description: History of state transitions
               items:
                  $ref: "#/components/schemas/WorkflowTransitionHistory"
            participants:
               type: array
               description: Pool of groups allowed to view and interact with this workflow instance. If empty, all users can view and interact with it. Copied from workflow definition at start time, but can be overridden.
               items:
                  type: string
                  format: uuid
            owner:
               type: string
               format: email
               description: Email of the user who started this workflow instance
            startedTime:
               type: string
               format: date-time
               description: Timestamp when this workflow instance was started
      WorkflowTransitionHistory:
         type: object
         required:
            - from
            - to
            - signal
            - timestamp
            - user
         properties:
            from:
               type: string
               description: Previous state name
            to:
               type: string
               description: New state name
            signal:
               type: string
               description: Signal/event that triggered the transition
            timestamp:
               type: string
               format: date-time
               description: When the transition occurred
            user:
               type: string
               format: email
               description: Email of the user who triggered the transition
            message:
               type: string
               description: Optional message describing the transition
      ArticleProperties:
         type: object
         required:
            - articleTitle
            - articleFid
            - articleResume
            - articleBody
         properties:
            articleTitle:
               type: string
               description: Article title
            articleFid:
               type: string
               description: Friendly ID (auto-generated from articleTitle if not provided)
            articleResume:
               type: string
               description: Article summary/resume
            articleBody:
               type: string
               description: Article body content
      ArticlePropertiesMap:
         type: object
         description: A map of locale codes to ArticleProperties
         additionalProperties:
            $ref: "#/components/schemas/ArticleProperties"
         example:
            pt:
               articleTitle: "Olá Mundo"
               articleFid: "ola-mundo"
               articleResume: "Este é um resumo"
               articleBody: "Conteúdo completo do artigo"
            en:
               articleTitle: "Hello World"
               articleFid: "hello-world"
               articleResume: "This is a summary"
               articleBody: "Full article content"
      RawArticleDTO:
         type: object
         required:
            - uuid
            - title
            - properties
            - articleAuthor
            - parent
            - createdTime
            - modifiedTime
            - owner
         properties:
            uuid:
               type: string
               format: uuid
               description: Unique identifier for the article
            title:
               type: string
               description: Node title (auto-generated from articleTitle in pt locale if not provided)
            description:
               type: string
               description: Optional description
            properties:
               $ref: "#/components/schemas/ArticlePropertiesMap"
               description: Article properties organized by locale
            articleAuthor:
               type: string
               description: Article author (not localized)
            parent:
               type: string
               format: uuid
               description: Parent folder UUID
            createdTime:
               type: string
               format: date-time
               description: Creation timestamp
            modifiedTime:
               type: string
               format: date-time
               description: Last modification timestamp
            owner:
               type: string
               format: email
               description: Owner email
      LocalizedArticleDTO:
         type: object
         required:
            - uuid
            - title
            - articleTitle
            - articleFid
            - articleResume
            - articleBody
            - articleAuthor
            - parent
            - createdTime
            - modifiedTime
            - owner
         properties:
            uuid:
               type: string
               format: uuid
               description: Unique identifier for the article
            title:
               type: string
               description: Node title
            description:
               type: string
               description: Optional description
            articleTitle:
               type: string
               description: Localized article title (selected by fallback logic)
            articleFid:
               type: string
               description: Localized friendly ID (selected by fallback logic)
            articleResume:
               type: string
               description: Localized article summary (selected by fallback logic)
            articleBody:
               type: string
               description: Localized article body (selected by fallback logic)
            articleAuthor:
               type: string
               description: Article author (not localized)
            parent:
               type: string
               format: uuid
               description: Parent folder UUID
            createdTime:
               type: string
               format: date-time
               description: Creation timestamp
            modifiedTime:
               type: string
               format: date-time
               description: Last modification timestamp
            owner:
               type: string
               format: email
               description: Owner email
      AuditEventDTO:
         type: object
         required:
            - streamId
            - eventId
            - eventType
            - occurredOn
            - userEmail
            - tenant
            - payload
            - sequence
         properties:
            streamId:
               type: string
               format: uuid
               description: The UUID of the node this event belongs to
            eventId:
               type: string
               format: uuid
               description: Unique identifier for this event
            eventType:
               type: string
               description: Type of event (e.g., NodeCreatedEvent, NodeUpdatedEvent, NodeDeletedEvent)
               enum:
                  - NodeCreatedEvent
                  - NodeUpdatedEvent
                  - NodeDeletedEvent
            occurredOn:
               type: string
               format: date-time
               description: When the event occurred
            userEmail:
               type: string
               format: email
               description: Email of the user who triggered the event
            tenant:
               type: string
               description: Tenant identifier
            payload:
               type: object
               description: Event-specific payload (NodeMetadata for create/delete, NodeUpdateChanges for update)
            sequence:
               type: integer
               description: Sequence number of the event in the stream (starts at 0)
      DeletedNodeInfo:
         type: object
         required:
            - uuid
            - title
            - deletedAt
            - deletedBy
         properties:
            uuid:
               type: string
               format: uuid
               description: UUID of the deleted node
            title:
               type: string
               description: Title of the node (from creation event)
            deletedAt:
               type: string
               format: date-time
               description: When the node was deleted
            deletedBy:
               type: string
               format: email
               description: Email of the user who deleted the node
      Notification:
         type: object
         required:
            - uuid
            - priority
            - title
            - body
            - timestamp
         properties:
            uuid:
               type: string
               format: uuid
               description: Unique identifier for the notification
            targetUser:
               type: string
               format: email
               description: Target user email (optional if targetGroup is provided)
            targetGroup:
               type: string
               format: uuid
               description: Target group UUID (optional if targetUser is provided)
            priority:
               type: string
               enum:
                  - CRITICAL
                  - INFO
                  - INSIGHT
               description: Priority level of the notification
            title:
               type: string
               description: Notification title
            body:
               type: string
               description: Notification body/message
            timestamp:
               type: string
               format: date-time
               description: When the notification was created
      CreateNotificationRequest:
         type: object
         required:
            - title
            - body
         properties:
            targetUser:
               type: string
               format: email
               description: Target user email (at least one of targetUser or targetGroup must be provided)
            targetGroup:
               type: string
               format: uuid
               description: Target group UUID (at least one of targetUser or targetGroup must be provided)
            title:
               type: string
               description: Notification title
            body:
               type: string
               description: Notification body/message
   securitySchemes:
      bearerAuth:
         type: http
         scheme: bearer
         bearerFormat: JWT
         description: "JWT token in Authorization header (Priority 2)"
      cookieAuth:
         type: apiKey
         in: cookie
         name: token
         description: "JWT token in HTTP-only cookie (Priority 3). Automatically sent by browser for same-origin requests."
      apiKeyHeader:
         type: apiKey
         in: header
         name: Authorization
         description: "API key in Authorization header format: 'ApiKey <key>' (Priority 1)"
      apiKeyQuery:
         type: apiKey
         in: query
         name: api_key
         description: "API key in query parameter (Priority 4)"
   parameters:
      UUID:
         name: uuid
         in: path
         required: true
         schema:
            type: string
   responses:
      Error:
         description: Error
         content:
            application/json:
               schema:
                  $ref: "#/components/schemas/AntboxError"
