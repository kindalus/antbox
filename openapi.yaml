         summary: Transition a workflow instance to a new state
         description: "{uuid} is the workflow instance UUID."
         operationId: transitionWorkflow
         parameters:
            - $ref: "#/components/parameters/UUID"
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: object
                     required:
                        - signal
                     properties:
