         tags:
            - workflows
         summary: Cancel a running workflow instance
         description: "{uuid} is the workflow instance UUID. Only the workflow owner or users in the --admins-- group can cancel a workflow instance."
         operationId: cancelWorkflow
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Workflow cancelled successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/WorkflowInstance"
            "400":
               description: Bad request - workflow is already cancelled or not running
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            "403":
               description: Forbidden - user is not the owner or admin
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
