openapi: 3.1.0
info:
   title: Antbox API
   version: "2.0.0"
   description: REST API for Antbox
servers:
   - url: /v2
     description: API server
security:
   - {}
   - bearerAuth: []
   - cookieAuth: []
   - apiKeyHeader: []
   - apiKeyQuery: []
tags:
   - name: admin
     description: Server administration operations (root-only)
   - name: heartbeat
     description: Server health check
   - name: actions
     description: Operations related to actions
   - name: agents
     description: Operations related to AI agents
   - name: api-keys
     description: Operations related to API keys
   - name: articles
     description: Operations related to articles (internationalized content)
   - name: aspects
     description: Operations related to aspects
   - name: audit
     description: Audit logging operations (admin-only)
   - name: docs
     description: API documentation
   - name: extensions
     description: Operations related to extensions
   - name: features
     description: Operations related to features
   - name: groups
     description: Operations related to user groups
   - name: login
     description: Authentication operations
   - name: nodes
     description: Operations related to nodes (files, folders, etc.)
   - name: notifications
     description: Operations related to user and group notifications
   - name: templates
     description: Operations related to templates
   - name: users
     description: Operations related to users
   - name: user-preferences
     description: Operations related to private user preferences for the authenticated user
   - name: workflows
     description: Operations related to workflow instances
paths:
   /heartbeat:
      get:
         tags:
            - heartbeat
         summary: Server health check
         operationId: heartbeat
         description: Public endpoint. Returns server status and current timestamp. No authentication required.
         security:
            - {}
         responses:
            "200":
               description: Server is up
               content:
                  application/json:
                     schema:
                        type: object
                        required:
                           - status
                           - timestamp
                        properties:
                           status:
                              type: string
                              example: ok
                           timestamp:
                              type: string
                              format: date-time
   /admin/runtime:
      get:
         tags:
            - admin
         summary: Get server runtime info
         operationId: getAdminRuntime
         description: Returns Deno version, memory usage, OS uptime and tenant list. Root-only. Only available on the default tenant.
         security:
            - bearerAuth: []
            - cookieAuth: []
         responses:
            "200":
               description: Runtime information
               content:
                  application/json:
                     schema:
                        type: object
                        properties:
                           deno:
                              type: object
                           memory:
                              type: object
                           uptime:
                              type: number
                           tenants:
                              type: array
                              items:
                                 type: string
            "403":
               description: Forbidden - caller is not the root user
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            "404":
               description: Not found - admin endpoints are only available on the default tenant
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
   /admin/reload:
      post:
         tags:
            - admin
         summary: Reload server configuration
         operationId: adminReload
         description: Triggers an in-process reload of all tenant configurations. Root-only. Only available on the default tenant.
         security:
            - bearerAuth: []
            - cookieAuth: []
         responses:
            "200":
               description: Server reloaded
               content:
                  application/json:
                     schema:
                        type: object
                        properties:
                           reloaded:
                              type: boolean
            "403":
               description: Forbidden - caller is not the root user
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            "404":
               description: Not found - admin endpoints are only available on the default tenant
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
   /admin/tenants:
      get:
         tags:
            - admin
         summary: Get tenant configurations
         operationId: getAdminTenants
         description: Returns the current TenantConfiguration array as stored in config.toml. Root-only.
         security:
            - bearerAuth: []
            - cookieAuth: []
         responses:
            "200":
               description: List of tenant configurations
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/TenantConfiguration"
            "403":
               description: Forbidden - caller is not the root user
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            "404":
               description: Not found - admin endpoints are only available on the default tenant
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
      put:
         tags:
            - admin
         summary: Replace tenant configurations
         operationId: updateAdminTenants
         description: Replaces the full tenant list in config.toml and triggers an in-process reload. Root-only.
         security:
            - bearerAuth: []
            - cookieAuth: []
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: array
                     minItems: 1
                     items:
                        $ref: "#/components/schemas/TenantConfiguration"
         responses:
            "200":
               description: Tenants updated and reloaded
               content:
                  application/json:
                     schema:
                        type: object
                        properties:
                           updated:
                              type: boolean
            "400":
               description: Bad request - tenants must be a non-empty array
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            "403":
               description: Forbidden - caller is not the root user
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            "404":
               description: Not found - admin endpoints are only available on the default tenant
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            "422":
               description: Invalid tenant configuration
               content:
                  application/json:
                     schema:
                        type: object
                        properties:
                           errors:
                              type: object
            default:
               $ref: "#/components/responses/Error"
   /actions:
      get:
         tags:
            - actions
         summary: List available actions
         operationId: listActions
         description: Returns all features that have exposeAction set to true.
         responses:
            "200":
               description: A list of action features
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/Feature"
            default:
               $ref: "#/components/responses/Error"
   "/actions/{uuid}/-/run":
      post:
         tags:
            - actions
         summary: Run an action
         operationId: runAction
         parameters:
            - $ref: "#/components/parameters/UUID"
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: object
                     properties:
                        uuids:
                           type: array
                           items:
                              type: string
                              format: uuid
                        parameters:
                           type: object
                           additionalProperties: true
         responses:
            "200":
               description: Action executed successfully. The response shape depends on the feature's returnType.
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/FeatureActionResult"
            default:
               $ref: "#/components/responses/Error"
   /agents:
      get:
         tags:
            - agents
         summary: List all agents
         operationId: listAgents
         responses:
            "200":
               description: A list of agents
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/Agent"
            default:
               $ref: "#/components/responses/Error"
   "/agents/-/upload":
      post:
         tags:
            - agents
         summary: Create an agent
         operationId: createAgent
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     $ref: "#/components/schemas/CreateAgentRequest"
         responses:
            "201":
               description: Agent created successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/Agent"
            default:
               $ref: "#/components/responses/Error"

   "/agents/{uuid}":
      get:
         tags:
            - agents
         summary: Get an agent
         operationId: getAgent
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Agent details
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/Agent"
            default:
               $ref: "#/components/responses/Error"
      delete:
         tags:
            - agents
         summary: Delete an agent
         operationId: deleteAgent
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Agent deleted successfully
            default:
               $ref: "#/components/responses/Error"
   "/agents/{uuid}/-/answer":
      post:
         tags:
            - agents
         summary: Get a structured answer from an agent
         operationId: answer
         description: "Direct user calls are only allowed for agents with `exposedToUsers: true`."
         parameters:
            - $ref: "#/components/parameters/UUID"
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: object
                     required:
                        - text
                     properties:
                        text:
                           type: string
                        options:
                           $ref: "#/components/schemas/AnswerOptions"
         responses:
            "200":
               description: Agent answer
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/ChatMessage"
            default:
               $ref: "#/components/responses/Error"
   "/agents/{uuid}/-/chat":
      post:
         tags:
            - agents
         summary: Chat with an agent
         operationId: chat
         description: "Direct user calls are only allowed for agents with `exposedToUsers: true`."
         parameters:
            - $ref: "#/components/parameters/UUID"
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: object
                     required:
                        - text
                     properties:
                        text:
                           type: string
                        options:
                           $ref: "#/components/schemas/ChatOptions"
         responses:
            "200":
               description: Agent chat response
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/ChatHistory"
            default:
               $ref: "#/components/responses/Error"
   /api-keys:
      get:
         tags:
            - api-keys
         summary: List API keys
         operationId: listApiKeys
         responses:
            "200":
               description: A list of API keys
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/ApiKey"
            default:
               $ref: "#/components/responses/Error"
      post:
         tags:
            - api-keys
         summary: Create an API key
         operationId: createApiKey
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: object
                     required:
                        - group
                     properties:
                        group:
                           type: string
                        description:
                           type: string
                        active:
                           type: boolean
         responses:
            "201":
               description: API key created
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/ApiKey"
            default:
               $ref: "#/components/responses/Error"
   "/api-keys/{uuid}":
      get:
         tags:
            - api-keys
         summary: Get an API key
         operationId: getApiKey
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: API key details
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/ApiKey"
            default:
               $ref: "#/components/responses/Error"
      delete:
         tags:
            - api-keys
         summary: Delete an API key
         operationId: deleteApiKey
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: API key deleted
            default:
               $ref: "#/components/responses/Error"
   /aspects:
      get:
         tags:
            - aspects
         summary: List aspects
         operationId: listAspects
         responses:
            "200":
               description: A list of aspects
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/Aspect"
            default:
               $ref: "#/components/responses/Error"
   "/aspects/-/upload":
      post:
         tags:
            - aspects
         summary: Create an aspect
         operationId: createAspect
         description: Upload an aspect JSON file as multipart/form-data in the `file` field. If the payload omits `uuid`, the server uses the uploaded file name without the last extension and replaces spaces with `-`.
         requestBody:
            required: true
            content:
               multipart/form-data:
                  schema:
                     $ref: "#/components/schemas/CreateAspectRequest"
         responses:
            "200":
               description: Aspect created successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/Aspect"
            default:
               $ref: "#/components/responses/Error"
   "/aspects/{uuid}":
      get:
         tags:
            - aspects
         summary: Get an aspect
         operationId: getAspect
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Aspect details
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/Aspect"
            default:
               $ref: "#/components/responses/Error"
      delete:
         tags:
            - aspects
         summary: Delete an aspect
         operationId: deleteAspect
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Aspect deleted
            default:
               $ref: "#/components/responses/Error"
   "/aspects/{uuid}/-/export":
      get:
         tags:
            - aspects
         summary: Export an aspect
         operationId: exportAspect
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Aspect exported successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/Aspect"
            default:
               $ref: "#/components/responses/Error"
   /articles:
      get:
         tags:
            - articles
         summary: List all articles
         operationId: listArticles
         responses:
            "200":
               description: A list of articles
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/RawArticleDTO"
            default:
               $ref: "#/components/responses/Error"
      post:
         tags:
            - articles
         summary: Create or replace an article
         operationId: createOrReplaceArticle
         requestBody:
            required: true
            content:
               multipart/form-data:
                  schema:
                     type: object
                     properties:
                        file:
                           type: string
                           format: binary
                           description: A JSON file containing the article's metadata with internationalized fields.
         responses:
            "200":
               description: Article created or replaced successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/RawArticleDTO"
            default:
               $ref: "#/components/responses/Error"
   "/articles/{uuid}":
      get:
         tags:
            - articles
         summary: Get an article (raw with all translations)
         operationId: getArticle
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Article details with all locale maps
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/RawArticleDTO"
            default:
               $ref: "#/components/responses/Error"
      delete:
         tags:
            - articles
         summary: Delete an article
         operationId: deleteArticle
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Article deleted successfully
            default:
               $ref: "#/components/responses/Error"
   "/articles/{uuid}/-/localized":
      get:
         tags:
            - articles
         summary: Get a localized article
         operationId: getLocalizedArticle
         description: Returns article with flattened strings based on locale fallback (requested → pt → en → first available)
         parameters:
            - $ref: "#/components/parameters/UUID"
            - name: locale
              in: query
              required: false
              schema:
                 type: string
                 default: pt
              description: Locale code (e.g., pt, en, fr, es)
         responses:
            "200":
               description: Localized article with flattened string fields
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/LocalizedArticleDTO"
            default:
               $ref: "#/components/responses/Error"
   "/articles/-/fid/{fid}":
      get:
         tags:
            - articles
         summary: Get a localized article by FID
         operationId: getArticleByFid
         description: Finds an article by its localized FID and returns the localized version
         parameters:
            - name: fid
              in: path
              required: true
              schema:
                 type: string
              description: The friendly ID (FID) in the specified locale
            - name: locale
              in: query
              required: false
              schema:
                 type: string
                 default: pt
              description: Locale code (e.g., pt, en, fr, es)
         responses:
            "200":
               description: Localized article found by FID
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/LocalizedArticleDTO"
            default:
               $ref: "#/components/responses/Error"
   "/audit/{uuid}":
      get:
         tags:
            - audit
         summary: Get audit log for a node
         operationId: getAuditLog
         description: Returns all audit events for a specific node. Admin-only access.
         parameters:
            - $ref: "#/components/parameters/UUID"
            - name: mimetype
              in: query
              required: true
              schema:
                 type: string
              description: The mimetype of the node (e.g., application/json, text/html)
         responses:
            "200":
               description: Audit events for the node
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/AuditEventDTO"
            "403":
               description: Forbidden - user is not an administrator
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
   "/audit/-/deleted":
      get:
         tags:
            - audit
         summary: Get deleted nodes by mimetype
         operationId: getDeletedNodes
         description: Returns information about all deleted nodes of a specific mimetype. Admin-only access.
         parameters:
            - name: mimetype
              in: query
              required: true
              schema:
                 type: string
              description: The mimetype to filter deleted nodes (e.g., application/json)
         responses:
            "200":
               description: List of deleted nodes
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/DeletedNodeInfo"
            "403":
               description: Forbidden - user is not an administrator
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
   /docs:
      get:
         tags:
            - docs
         summary: List available documentation
         operationId: listDocs
         responses:
            "200":
               description: A list of available documentation
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/DocInfo"
            default:
               $ref: "#/components/responses/Error"
   /docs/api:
      get:
         tags:
            - docs
         summary: Interactive API explorer
         operationId: apiExplorer
         description: Serves a Scalar UI page that renders the OpenAPI spec. No authentication required.
         security:
            - {}
         responses:
            "200":
               description: HTML explorer page
               content:
                  text/html:
                     schema:
                        type: string
   "/docs/{uuid}":
      get:
         tags:
            - docs
         summary: Get a document
         operationId: getDoc
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Document content
               content:
                  text/markdown:
                     schema:
                        type: string
            default:
               $ref: "#/components/responses/Error"
   /extensions:
      get:
         tags:
            - extensions
         summary: List all extensions
         operationId: listExtensions
         description: Returns all features that have exposeExtension set to true.
         responses:
            "200":
               description: A list of extension features
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/Feature"
            default:
               $ref: "#/components/responses/Error"
   "/extensions/{uuid}/-/exec":
      get:
         tags:
            - extensions
         summary: Run an extension (GET)
         operationId: runExtensionGet
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Extension run result (shape depends on feature returnType)
               content:
                  application/json:
                     schema:
                        type: object
                  text/plain:
                     schema:
                        type: string
                  application/octet-stream:
                     schema:
                        type: string
                        format: binary
            default:
               $ref: "#/components/responses/Error"
      post:
         tags:
            - extensions
         summary: Run an extension (POST)
         operationId: runExtension
         parameters:
            - $ref: "#/components/parameters/UUID"
         requestBody:
            content:
               application/json:
                  schema:
                     type: object
                     additionalProperties: true
               application/x-www-form-urlencoded:
                  schema:
                     type: object
                     additionalProperties: true
               multipart/form-data:
                  schema:
                     type: object
                     additionalProperties: true
         responses:
            "200":
               description: Extension run result (shape depends on feature returnType)
               content:
                  application/json:
                     schema:
                        type: object
                  text/plain:
                     schema:
                        type: string
                  application/octet-stream:
                     schema:
                        type: string
                        format: binary
            default:
               $ref: "#/components/responses/Error"
   /features:
      get:
         tags:
            - features
         summary: List features
         operationId: listFeatures
         responses:
            "200":
               description: A list of features
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/Feature"
            default:
               $ref: "#/components/responses/Error"
   "/features/-/upload":
      post:
         tags:
            - features
         summary: Create a feature
         operationId: createFeature
         description: Upload a JavaScript feature module as multipart/form-data in the `file` field. If `export default.uuid` is missing, the server uses the uploaded file name without the last extension and replaces spaces with `_`.
         requestBody:
            required: true
            content:
               multipart/form-data:
                  schema:
                     $ref: "#/components/schemas/CreateFeatureRequest"
         responses:
            "201":
               description: Feature created successfully
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/Feature"
            default:
               $ref: "#/components/responses/Error"
   "/features/{uuid}":
      get:
         tags:
            - features
         summary: Get a feature
         operationId: getFeature
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Feature details
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/Feature"
            default:
               $ref: "#/components/responses/Error"
      delete:
         tags:
            - features
         summary: Delete a feature
         operationId: deleteFeature
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Feature deleted
            default:
               $ref: "#/components/responses/Error"
   "/features/{uuid}/-/export":
      get:
         tags:
            - features
         summary: Export a feature
         operationId: exportFeature
         parameters:
            - $ref: "#/components/parameters/UUID"
         responses:
            "200":
               description: Feature exported successfully
               content:
                  application/javascript:
                     schema:
                        type: string
            default:
               $ref: "#/components/responses/Error"
   /groups:
      get:
         tags:
            - groups
         summary: List groups
         operationId: listGroups
         responses:
            "200":
               description: A list of groups
               content:
                  application/json:
                     schema:
                        type: array
                        items:
                           $ref: "#/components/schemas/Group"
            default:
               $ref: "#/components/responses/Error"
      post:
         tags:
            - groups
         summary: Create a group
         operationId: createGroup
         requestBody:
            required: true
            content:
               application/json:
                  schema:
                     type: object
                     required:
                        - title
                     properties:
                        title:
                           type: string
                        description:
                           type: string
         responses:
            "201":
               description: Group created
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/Group"
            default:
               $ref: "#/components/responses/Error"
   "/groups/{uuid}":
      get:
         tags:
            - groups
         summary: Get a group
         operationId: getGroup
         parameters:
