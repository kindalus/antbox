                     type: string
                     description: SHA-256 encoded root password
         responses:
            "200":
               description: Login successful. Returns JWT in response body and sets HTTP-only cookie.
               headers:
                  Set-Cookie:
                     description: HTTP-only authentication cookie (token=<jwt>)
                     schema:
                        type: string
                        example: "token=<jwt>; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=14400"
               content:
                  application/json:
                     schema:
                        type: object
                        properties:
                           jwt:
                              type: string
                              description: JWT token valid for 4 hours
            "401":
               description: Unauthorized
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
   /challenge:
      post:
         tags:
            - login
         summary: External user challenge
         operationId: challengeExternalUser
         description: Validates an external bearer JWT against the tenant JWKS and checks whether a local Antbox user exists for the token email or phone claims.
         security:
            - bearerAuth: []
         responses:
            "204":
               description: Matching local user exists
            "404":
               description: No matching local user exists
               content:
                  application/json:
                     schema:
                        $ref: "#/components/schemas/AntboxError"
            default:
               $ref: "#/components/responses/Error"
   /login:
      post:
         tags:
